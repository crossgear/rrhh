{% extends "base/base.html" %}

{% block title %}Quitar administrador{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Quitar Administrador RRHH</h5>
            </div>
            <div class="card-body">
                <p class="mb-2">¿Estás seguro que querés quitar este usuario de administradores RRHH?</p>
                <div class="alert alert-light border">
                    <strong>{{ object.username }}</strong>
                </div>
                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Sí, quitar
                    </button>
                    <a href="{% url 'admin-rrhh-list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
