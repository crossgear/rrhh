{% extends "base/base.html" %}

{% block content %}
<h2>Agregar Administrador RRHH</h2>

<form method="post" class="card p-3">
    {% csrf_token %}

    <label class="form-label">Usuario de dominio</label>
    <input type="text" name="username" class="form-control" placeholder="ej: victor-gimenez" required>

    <div class="mt-3">
        <button type="submit" class="btn btn-success">
            Guardar
        </button>
        <a href="{% url 'admin-rrhh-list' %}" class="btn btn-secondary">
            Cancelar
        </a>
    </div>
</form>
{% endblock %}
