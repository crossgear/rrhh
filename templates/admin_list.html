{% extends "base/base.html" %}

{% block content %}
<h2>Administradores RRHH</h2>

<a href="{% url 'admin-rrhh-add' %}" class="btn btn-primary mb-3">
    ➕ Agregar Administrador
</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Usuario</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for admin in admins %}
        <tr>
            <td>{{ admin.username }}</td>
            <td>
                <a href="{% url 'admin-rrhh-delete' admin.id %}" class="btn btn-danger btn-sm">
                    ❌ Quitar
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
