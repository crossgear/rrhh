{% extends 'base/base.html' %}

{% block title %}Nueva Observación{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="bi bi-chat-left-text"></i> Nueva Observación</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="persona" value="{{ request.GET.persona|default:persona.id }}">

                    <div class="mb-3">
                        <label for="id_DESCRIPCION" class="form-label">Descripción *</label>
                        <textarea name="DESCRIPCION" class="form-control" id="id_DESCRIPCION"
                                  rows="5" required placeholder="Escriba la observación aquí..."></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-info">
                            <i class="bi bi-send"></i> Guardar Observación
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
