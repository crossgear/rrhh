{% extends 'base/base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-badge"></i> {{ titulo }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="CI_NUMERO" class="form-label">Número de CI *</label>
                                <input type="text" name="CI_NUMERO" class="form-control"
                                       id="CI_NUMERO" value="{{ form.CI_NUMERO.value|default:'' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <div class="form-check mt-2">
                                    <input type="checkbox" class="form-check-input" name="ACTIVO"
                                           id="ACTIVO" {% if form.ACTIVO.value %}checked{% endif %}>
                                    <label class="form-check-label" for="ACTIVO">Activo</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="NOMBRES" class="form-label">Nombres *</label>
                                <input type="text" name="NOMBRES" class="form-control"
                                       id="NOMBRES" value="{{ form.NOMBRES.value|default:'' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="APELLIDOS" class="form-label">Apellidos *</label>
                                <input type="text" name="APELLIDOS" class="form-control"
                                       id="APELLIDOS" value="{{ form.APELLIDOS.value|default:'' }}" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="FECHA_NACIMIENTO" class="form-label">Fecha de Nacimiento *</label>
                                <input type="date" name="FECHA_NACIMIENTO" class="form-control"
                                       id="FECHA_NACIMIENTO" value="{{ form.FECHA_NACIMIENTO.value|default:'' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="ESTADO_CIVIL" class="form-label">Estado Civil</label>
                                <select name="ESTADO_CIVIL" class="form-select" id="ESTADO_CIVIL">
                                    <option value="">-- Seleccione --</option>
                                    {% for value, label in estado_civil_choices %}
                                        <option value="{{ value }}"
                                                {% if form.ESTADO_CIVIL.value == value %}selected{% endif %}>
                                            {{ label }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="TELEFONO" class="form-label">Teléfono</label>
                                <input type="text" name="TELEFONO" class="form-control"
                                       id="TELEFONO" value="{{ form.TELEFONO.value|default:'' }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="EMAIL" class="form-label">Email</label>
                                <input type="email" name="EMAIL" class="form-control"
                                       id="EMAIL" value="{{ form.EMAIL.value|default:'' }}">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'persona-list' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
